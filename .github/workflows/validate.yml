name: Validate

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run HACS validation
        uses: hacs/action@main
        with:
          category: integration
          # The 'brands' check stays red until tesla_telemetry is merged
          # into home-assistant/brands (a separate PR to that repo).
          # Ignore it here so unrelated regressions remain visible.
          ignore: brands
